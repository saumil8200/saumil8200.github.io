<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saumil Shah</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Arvo:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .container-s {
            width: 80%;
        }
    </style>
</head>
<body class="bg-gray-100 text-[#333] font-['Inter'] dark:bg-[#191A19] dark:text-white">
    <main class="container-s mx-auto">
        <section id="social" class="my-16 font-semibold text-sm">
            <h2 class="text-3xl font-bold mb-8 font-['Arvo']">Connect with me</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 text-white">
                <div class="p-3 bg-[#0077B5] rounded-lg flex items-center">
                    <img src="./assets/icons/linkedin.png" class="w-8 h-8 invert">
                    <p class="px-3">LinkedIn</p>
                </div>
                <div class="p-3 bg-[#000000] rounded-lg flex items-center">
                    <img src="./assets/icons/x.png" class="w-8 h-8 invert">
                    <p class="px-3">Twitter / X</p>
                </div>
                <div class="p-3 bg-[#e4405f] rounded-lg flex items-center">
                    <img src="./assets/icons/instagram.png" class="w-8 h-8 invert">
                    <p class="px-3">Instagram</p>
                </div>
                <div class="p-3 bg-[#000000] rounded-lg flex items-center">
                    <img src="./assets/icons/threads.png" class="w-8 h-8 invert">
                    <p class="px-3">Threads</p>
                </div>
                <div class="p-3 bg-[#2d2344] rounded-lg flex items-center">
                    <img src="./assets/icons/mastodon.png" class="w-8 h-8 invert">
                    <p class="px-3">Mastodon</p>
                </div>
                <div class="p-3 bg-[#0088cc] rounded-lg flex items-center">
                    <img src="./assets/icons/telegram.png" class="w-8 h-8 invert">
                    <p class="px-3">Telegram</p>
                </div>
                <div class="p-3 bg-[#ff4500] rounded-lg flex items-center">
                    <img src="./assets/icons/reddit.png" class="w-8 h-8 invert">
                    <p class="px-3">Reddit</p>
                </div>
            </div>
            <div class="mt-8">
                <h3 class="text-lg font-bold mb-4">Check out my works</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 text-white">
                    <div class="p-3 bg-[#333] rounded-lg flex items-center">
                        <img src="./assets/icons/github.png" class="w-8 h-8 invert">
                        <p class="px-3">GitHub</p>
                    </div>
                    <div class="p-3 bg-[#053eff] rounded-lg flex items-center">
                        <img src="./assets/icons/behance.png" class="w-8 h-8 invert">
                        <p class="px-3">Behance</p>
                    </div>
                    <div class="p-3 bg-[#ea4c89] rounded-lg flex items-center">
                        <img src="./assets/icons/dribbble.png" class="w-8 h-8 invert">
                        <p class="px-3">Dribbble</p>
                    </div>
                </div>
            </div>
            <div class="mt-8">
                <h3 class="text-lg font-bold mb-4">Check out my blogs</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 text-white">
                    <div class="p-3 bg-[#142922] rounded-lg flex items-center">
                        <img src="./assets/icons/medium.png" class="w-8 h-8 invert">
                        <p class="px-3">Medium</p>
                    </div>
                </div>
            </div>
            <div class="mt-8">
                <h3 class="text-lg font-bold mb-4">Check out my KWGT Widgets</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 text-white">
                    <div class="p-3 bg-[#0088cc] rounded-lg flex items-center">
                        <img src="./assets/icons/telegram.png" class="w-8 h-8 invert">
                        <p class="px-3">Stylish Widgets</p>
                    </div>
                </div>
            </div>
            <div class="mt-8">
                <h3 class="text-lg font-bold mb-4">Hire Me for Freelance Work?</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 text-white">
                    <div class="p-3 bg-[#4285F4] rounded-lg flex items-center">
                        <img src="./assets/icons/mail.png" class="w-8 h-8 invert">
                        <p class="px-3">Get in touch</p>
                    </div>
                    <div class="p-3 bg-[#00B22D] rounded-lg flex items-center">
                        
                        <p class="px-3">Fiverr</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
